kind = "web"
previewPath = "/"
title = "IA Calorias"
version = "1.0.0"
id = "artifacts/ia-calorias"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20732

[services.development]
run = "pnpm --filter @workspace/ia-calorias run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ia-calorias", "run", "build" ]
publicDir = "artifacts/ia-calorias/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20732"
BASE_PATH = "/"
