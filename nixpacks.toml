[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm@10 && ln -sf $(npm bin -g)/pnpm /usr/local/bin/pnpm && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["node scripts/build-railway.mjs"]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
