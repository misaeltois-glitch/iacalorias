[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@10 --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["node scripts/build-railway.mjs"]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
